<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sanji Key Free - Nhận Key Kích Hoạt Miễn Phí</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Poppins', 'Roboto', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0A0F1E 0%, #0F1629 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Container chính */
        .container {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
        }

        /* Card chính - glassmorphism bo góc */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            padding: 32px 24px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 215, 0, 0.1);
            transition: all 0.3s ease;
            text-align: center;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 28px;
        }
        .logo-icon {
            font-size: 64px;
            margin-bottom: 12px;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        h1 {
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 28px;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }
        .badge {
            display: inline-block;
            background: rgba(255, 215, 0, 0.2);
            border: 1px solid rgba(255, 215, 0, 0.5);
            border-radius: 40px;
            padding: 4px 16px;
            font-size: 11px;
            color: #FFD700;
            margin-top: 8px;
        }

        /* Thông tin key */
        .key-info {
            background: rgba(0, 149, 255, 0.15);
            border-radius: 24px;
            padding: 20px;
            margin: 24px 0;
            border-left: 3px solid #0095FF;
        }
        .key-label {
            font-size: 13px;
            color: #88AAFF;
            letter-spacing: 1px;
            margin-bottom: 12px;
            font-weight: 500;
        }
        .key-value {
            font-family: 'Courier New', monospace;
            font-size: 22px;
            font-weight: bold;
            color: #00FFAA;
            word-break: break-all;
            background: rgba(0, 0, 0, 0.5);
            padding: 14px;
            border-radius: 16px;
            text-align: center;
            letter-spacing: 1.5px;
        }
        .copy-btn {
            background: rgba(0, 149, 255, 0.3);
            border: none;
            color: #0095FF;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 13px;
            cursor: pointer;
            margin-top: 14px;
            transition: all 0.2s;
            width: 100%;
            font-weight: bold;
        }
        .copy-btn:hover {
            background: #0095FF;
            color: white;
            transform: scale(1.02);
        }

        /* Nút lấy key chính */
        .btn-glow {
            width: 100%;
            padding: 16px;
            background: linear-gradient(90deg, #0095FF, #00C8FF);
            border: none;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 149, 255, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin: 16px 0;
        }
        .btn-glow:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 149, 255, 0.6);
            background: linear-gradient(90deg, #00A5FF, #00D8FF);
        }
        .btn-glow:active {
            transform: translateY(1px);
        }
        .btn-glow:disabled {
            opacity: 0.6;
            transform: none;
            cursor: not-allowed;
        }

        /* Nút lấy key mới */
        .btn-secondary {
            width: 100%;
            padding: 12px;
            background: rgba(255, 215, 0, 0.15);
            border: 1px solid rgba(255, 215, 0, 0.4);
            border-radius: 60px;
            color: #FFD700;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-secondary:hover {
            background: rgba(255, 215, 0, 0.3);
            border-color: #FFD700;
        }

        /* Thông báo toast */
        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background: #1A2A3A;
            backdrop-filter: blur(16px);
            padding: 12px 24px;
            border-radius: 60px;
            color: #FFD700;
            font-size: 14px;
            font-weight: 500;
            opacity: 0;
            transition: all 0.3s;
            pointer-events: none;
            z-index: 1000;
            white-space: nowrap;
            border-left: 3px solid #FFD700;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }
        .toast-msg.show {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }

        /* Footer */
        .footer-note {
            text-align: center;
            margin-top: 24px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            line-height: 1.5;
        }
        .counter {
            text-align: center;
            margin: 16px 0 8px;
            font-size: 12px;
            color: #88AAFF;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px;
            border-radius: 40px;
        }
        .highlight {
            color: #FFD700;
            font-weight: bold;
            font-size: 16px;
        }

        /* Loading spinner */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="glass-card">
        <div class="header">
            <div class="logo-icon">🔑✨</div>
            <h1>NHẬN KEY FREE</h1>
            <div class="badge">Sanji Ping VIP - Pro Edition</div>
        </div>

        <!-- Khu vực hiển thị key -->
        <div id="keyDisplayArea">
            <div class="key-info">
                <div class="key-label">🎁 KEY KÍCH HOẠT CỦA BẠN</div>
                <div class="key-value" id="generatedKey">⚡ Nhấn nút bên dưới ⚡</div>
                <button class="copy-btn" id="copyKeyBtn" style="display: none;">📋 Sao chép key</button>
            </div>
        </div>

        <!-- Nút lấy key chính -->
        <button class="btn-glow" id="getKeyBtn">
            <span>🎟️</span> NHẬN KEY MIỄN PHÍ NGAY
        </button>

        <!-- Nút lấy key mới (sẽ hiện sau khi đã có key) -->
        <button class="btn-secondary" id="newKeyBtn" style="display: none;">
            🔄 LẤY KEY MỚI
        </button>

        <!-- Thống kê -->
        <div class="counter">
            💎 Hôm nay đã cấp: <span id="todayCount" class="highlight">0</span> / <span class="highlight">200</span> key
        </div>
        
        <div class="footer-note">
            ⚡ Key có thời hạn 30 ngày • Mỗi lượt nhận là 1 key duy nhất<br>
            🚀 Không cần đăng ký, không cần email – hoàn toàn miễn phí
        </div>
    </div>
</div>

<!-- Toast thông báo -->
<div id="toastMsg" class="toast-msg">✨ Thông báo</div>

<script>
    // ======================== QUẢN LÝ KEY (localStorage) ========================
    // Key được lưu theo phiên, không cần email
    let currentKey = null;
    
    // Lấy key đã lưu trong localStorage (nếu có)
    function loadSavedKey() {
        const saved = localStorage.getItem('sanji_current_key');
        const savedTime = localStorage.getItem('sanji_key_time');
        if (saved && savedTime) {
            const timeDiff = Date.now() - parseInt(savedTime);
            const thirtyDays = 30 * 24 * 60 * 60 * 1000;
            if (timeDiff < thirtyDays) {
                return saved;
            } else {
                // Key đã hết hạn, xóa
                localStorage.removeItem('sanji_current_key');
                localStorage.removeItem('sanji_key_time');
                return null;
            }
        }
        return null;
    }

    // Lưu key mới
    function saveNewKey(key) {
        localStorage.setItem('sanji_current_key', key);
        localStorage.setItem('sanji_key_time', Date.now().toString());
        currentKey = key;
    }

    // Tạo key ngẫu nhiên (đẹp hơn)
    function generateRandomKey() {
        const prefix = "SANJI";
        const part1 = Math.random().toString(36).substring(2, 6).toUpperCase();
        const part2 = Math.random().toString(36).substring(2, 6).toUpperCase();
        const part3 = Math.floor(Math.random() * 10000).toString().padStart(4, '0');
        const part4 = Math.random().toString(36).substring(2, 5).toUpperCase();
        return `${prefix}-${part1}-${part2}-${part3}-${part4}`;
    }

    // Thống kê số key đã cấp hôm nay (dựa trên số lần generate trong localStorage)
    function getTodayKeyCount() {
        const today = new Date().toDateString();
        const log = JSON.parse(localStorage.getItem('sanji_key_log')) || {};
        return log[today] || 0;
    }

    // Tăng số lượng key đã cấp hôm nay
    function incrementTodayCount() {
        const today = new Date().toDateString();
        const log = JSON.parse(localStorage.getItem('sanji_key_log')) || {};
        log[today] = (log[today] || 0) + 1;
        localStorage.setItem('sanji_key_log', JSON.stringify(log));
        updateCounterDisplay();
    }

    // Cập nhật hiển thị số lượng key đã cấp
    function updateCounterDisplay() {
        const count = getTodayKeyCount();
        document.getElementById('todayCount').innerText = count;
    }

    // Hiển thị toast
    function showToast(message, isError = false) {
        const toast = document.getElementById('toastMsg');
        toast.textContent = message;
        toast.style.borderLeftColor = isError ? '#FF4444' : '#FFD700';
        toast.style.color = isError ? '#FF8888' : '#FFD700';
        toast.classList.add('show');
        setTimeout(() => {
            toast.classList.remove('show');
        }, 3000);
    }

    // Hiển thị key lên giao diện
    function displayKey(key, isNew = true) {
        const keySpan = document.getElementById('generatedKey');
        const copyBtn = document.getElementById('copyKeyBtn');
        const newKeyBtn = document.getElementById('newKeyBtn');
        
        keySpan.innerText = key;
        keySpan.style.color = "#00FFAA";
        copyBtn.style.display = 'block';
        newKeyBtn.style.display = 'block';
        
        if (isNew) {
            showToast(`🎉 Key mới đã được tạo: ${key}`, false);
        } else {
            showToast(`🔑 Đã tải key hiện tại: ${key}`, false);
        }
    }

    // Xử lý nhận key
    async function getNewKey() {
        const getBtn = document.getElementById('getKeyBtn');
        const originalText = getBtn.innerHTML;
        
        // Kiểm tra giới hạn 200 key/ngày
        const todayCount = getTodayKeyCount();
        if (todayCount >= 200) {
            showToast('⚠️ Hôm nay đã đạt giới hạn 200 key. Vui lòng quay lại ngày mai!', true);
            return false;
        }
        
        // Hiệu ứng loading
        getBtn.innerHTML = '<span class="loading"></span> Đang tạo key...';
        getBtn.disabled = true;
        
        // Giả lập độ trễ mạng (tạo cảm giác chuyên nghiệp)
        await new Promise(resolve => setTimeout(resolve, 600));
        
        const newKey = generateRandomKey();
        saveNewKey(newKey);
        incrementTodayCount();
        displayKey(newKey, true);
        
        getBtn.innerHTML = originalText;
        getBtn.disabled = false;
        return true;
    }

    // Tải key hiện có (nếu chưa hết hạn)
    function loadExistingKey() {
        const existingKey = loadSavedKey();
        if (existingKey) {
            currentKey = existingKey;
            displayKey(existingKey, false);
            return true;
        }
        return false;
    }

    // Sao chép key
    function setupCopy() {
        const copyBtn = document.getElementById('copyKeyBtn');
        copyBtn.addEventListener('click', async () => {
            const keyText = document.getElementById('generatedKey').innerText;
            if (keyText && !keyText.includes('Nhấn nút')) {
                try {
                    await navigator.clipboard.writeText(keyText);
                    showToast('📋 Đã sao chép key vào bộ nhớ tạm!', false);
                } catch (err) {
                    showToast('⚠️ Vui lòng sao chép thủ công', true);
                }
            } else {
                showToast('❌ Chưa có key nào để sao chép!', true);
            }
        });
    }

    // Xử lý lấy key mới (khi đã có key cũ)
    function setupNewKeyButton() {
        const newKeyBtn = document.getElementById('newKeyBtn');
        newKeyBtn.addEventListener('click', async () => {
            const confirmed = confirm('⚠️ Lấy key mới sẽ thay thế key hiện tại. Key cũ sẽ không còn hiệu lực. Bạn chắc chắn?');
            if (confirmed) {
                await getNewKey();
            }
        });
    }

    // ========== KHỞI TẠO ==========
    function init() {
        setupCopy();
        setupNewKeyButton();
        updateCounterDisplay();
        
        // Tải key cũ nếu có
        const hasKey = loadExistingKey();
        
        // Gắn sự kiện cho nút lấy key chính
        const getBtn = document.getElementById('getKeyBtn');
        getBtn.addEventListener('click', async () => {
            await getNewKey();
        });
        
        // Nếu chưa có key, hiển thị hướng dẫn
        if (!hasKey) {
            document.getElementById('generatedKey').innerText = '✨ Nhấn "NHẬN KEY" để bắt đầu ✨';
            document.getElementById('generatedKey').style.color = '#88AAFF';
        }
    }
    
    // Chạy
    init();
</script>
</body>
</html>
