<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sanji Ping VIP</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
    }

    body {
        height: 100vh;
        background: radial-gradient(circle at top, #001f3f, #000814);
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        color: #fff;
    }

    /* CARD */
    .card {
        width: 380px;
        padding: 25px;
        border-radius: 25px;
        background: rgba(0, 30, 60, 0.6);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(0, 150, 255, 0.3);
        box-shadow: 0 0 30px rgba(0, 150, 255, 0.2);
        text-align: center;
        position: relative;
    }

    /* TITLE */
    .title {
        font-size: 28px;
        letter-spacing: 6px;
        color: #4fc3ff;
        text-shadow: 0 0 10px #00bfff;
        margin-bottom: 10px;
    }

    .badge {
        display: inline-block;
        padding: 6px 14px;
        border-radius: 20px;
        background: rgba(0, 120, 255, 0.2);
        border: 1px solid rgba(0, 180, 255, 0.5);
        font-size: 12px;
        margin-bottom: 20px;
    }

    /* KEY BOX */
    .key-box {
        border-radius: 20px;
        padding: 20px;
        border: 1px solid rgba(0, 150, 255, 0.5);
        background: rgba(0, 60, 120, 0.3);
        box-shadow: inset 0 0 20px rgba(0,150,255,0.2);
        margin-bottom: 20px;
    }

    .key {
        font-size: 18px;
        letter-spacing: 2px;
        color: #8fd3ff;
        margin: 10px 0;
    }

    .info {
        font-size: 12px;
        opacity: 0.8;
        margin-top: 5px;
    }

    /* BUTTONS */
    .btn {
        width: 100%;
        padding: 12px;
        border-radius: 30px;
        border: none;
        margin-top: 10px;
        cursor: pointer;
        font-weight: bold;
    }

    .btn-copy {
        background: rgba(0, 100, 200, 0.3);
        border: 1px solid rgba(0, 150, 255, 0.6);
        color: #cfefff;
    }

    .btn-active {
        background: linear-gradient(90deg, #00aaff, #0077ff);
        color: white;
        box-shadow: 0 0 15px #00aaff;
    }

    .back {
        font-size: 12px;
        margin-top: 10px;
        opacity: 0.7;
    }

    /* HEART ANIMATION */
    .heart {
        position: absolute;
        color: #00bfff;
        font-size: 18px;
        animation: float 6s linear infinite;
        opacity: 0.7;
    }

    @keyframes float {
        0% {
            transform: translateY(100vh);
            opacity: 0;
        }
        50% {
            opacity: 1;
        }
        100% {
            transform: translateY(-10vh);
            opacity: 0;
        }
           .btn-main {
        display: block;
        width: 100%;
        padding: 14px;
        border-radius: 30px;
        background: linear-gradient(90deg, #00aaff, #0077ff);
        color: white;
        text-decoration: none;
        font-weight: bold;
        letter-spacing: 1px;
        box-shadow: 0 0 20px rgba(0,170,255,0.7);
        transition: 0.2s;
    }

    .btn-main:hover {
        transform: scale(1.05);
        box-shadow: 0 0 30px rgba(0,170,255,1);
    }
    .link-bottom {
        margin-top: 15px;
        display: block;
        font-size: 13px;
        color: #8fd3ff;
        text-decoration: none;
        opacity: 0.8;
    }

    .link-bottom:hover {
        opacity: 1;
        text-decoration: underline;
    }
   
    }

</style>
</head>

<body>

<div class="card">
    <div class="title">SANJI PING</div>
    <div class="badge">Admin Tạo Key : @QuyModgame</div>

    <div class="key-box">
        <div style="font-size:30px;">🔑</div>
        <div class="key">VIP-89C7-1C9G-FYKO-D2YT</div>
        <div class="info">⏰ Hạn dùng: 17:48:30 14/4/2026</div>
        <div class="info">📱 Giới hạn 1 thiết bị</div>
    </div>
</div

   
<!-- HEARTS -->
<script>
function createHeart() {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML =     const texts = ['Ｓ Ａ Ｎ Ｊ Ｉ － Ｐ Ｉ Ｎ Ｇ ', 'Hero x QuyModgame', '🩵', '💙', '', 'Hero', 'QuyMod'];
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (4 + Math.random() * 3) + "s";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 7000);
}

setInterval(createHeart, 500);
</script>

</body>
</html>
